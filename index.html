<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garanti Yonca Loader</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 32px;
            background: #f5f7f6;
            font-family: Arial, sans-serif;
            padding-top: 56px;
            box-sizing: border-box;
        }

        object {
            width: 100%;
            height: 100%;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 4px;
            border: 1px solid #d9e1dc;
            border-radius: 999px;
            background: #ffffff;
        }

        .tab {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            background: transparent;
            color: #30513c;
            cursor: pointer;
            font: inherit;
        }

        .tab[aria-selected="true"] {
            background: #0f5f2b;
            color: #ffffff;
        }

        .panel {
            display: none;
            place-items: center;
            min-height: 220px;
        }

        .panel.is-active {
            display: grid;
        }

        .loader {
            width: min(40vw, 160px);
            aspect-ratio: 39 / 59;
        }

        .bloom-loader {
            position: relative;
            display: grid;
            place-items: center;
            width: min(40vw, 160px);
            aspect-ratio: 39 / 59;
            isolation: isolate;
        }

        .bloom-loader::before {
            content: "";
            position: absolute;
            width: 54%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(72, 182, 82, 0.24), rgba(72, 182, 82, 0));
            animation: bloom-ring 2s ease-in-out infinite;
            z-index: -1;
        }

        .bloom-loader img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform-origin: 50% 52%;
            animation: bloom-clover 2s ease-in-out infinite;
        }

        .bloom-core {
            position: absolute;
            width: 18%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: radial-gradient(circle, #8eea83 0%, #2e9b45 48%, rgba(46, 155, 69, 0) 72%);
            animation: bloom-core 2s ease-in-out infinite;
        }

        @keyframes bloom-clover {
            0%, 8% {
                opacity: 0;
                clip-path: circle(0% at 50% 52%);
                transform: scale(0.58);
                filter: saturate(0.86) brightness(0.94);
            }
            22% {
                opacity: 1;
                clip-path: circle(22% at 50% 52%);
                transform: scale(0.78);
                filter: saturate(1.08) brightness(1.08);
            }
            50% {
                opacity: 1;
                clip-path: circle(82% at 50% 52%);
                transform: scale(1.035);
                filter: saturate(1.18) brightness(1.1);
            }
            72%, 86% {
                opacity: 1;
                clip-path: circle(120% at 50% 52%);
                transform: scale(1);
                filter: saturate(1) brightness(1);
            }
            100% {
                opacity: 0;
                clip-path: circle(124% at 50% 52%);
                transform: scale(0.96);
                filter: saturate(0.92) brightness(0.96);
            }
        }

        @keyframes bloom-core {
            0%, 10% {
                opacity: 0;
                transform: scale(0.24);
            }
            18%, 36% {
                opacity: 1;
                transform: scale(1);
            }
            58%, 100% {
                opacity: 0;
                transform: scale(2.2);
            }
        }

        @keyframes bloom-ring {
            0%, 12% {
                opacity: 0;
                transform: scale(0.2);
            }
            42% {
                opacity: 1;
                transform: scale(1);
            }
            88%, 100% {
                opacity: 0;
                transform: scale(1.7);
            }
        }
    </style>
</head>
<body>
    <nav class="tabs" aria-label="Loading animasyonlari">
        <button class="tab" type="button" aria-selected="true" aria-controls="loading-1" data-tab="loading-1">Loading-1</button>
        <button class="tab" type="button" aria-selected="false" aria-controls="loading-2" data-tab="loading-2">Loading-2</button>
    </nav>
    <main>
        <section class="panel is-active" id="loading-1" aria-label="Loading 1">
            <div class="loader" aria-label="Garanti yonca loading animasyonu">
                <object type="image/svg+xml" data="./garanti-clover-loader.svg" aria-label="Loading"></object>
            </div>
        </section>
        <section class="panel" id="loading-2" aria-label="Loading 2">
            <div class="bloom-loader" aria-label="Garanti yonca bloom loading animasyonu">
                <span class="bloom-core" aria-hidden="true"></span>
                <img src="./loader-4.svg" alt="">
            </div>
        </section>
    </main>
    <script>
        const tabs = document.querySelectorAll(".tab");
        const panels = document.querySelectorAll(".panel");

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => {
                const target = tab.dataset.tab;

                tabs.forEach((item) => {
                    item.setAttribute("aria-selected", String(item === tab));
                });

                panels.forEach((panel) => {
                    panel.classList.toggle("is-active", panel.id === target);
                });
            });
        });
    </script>
</body>
</html>
