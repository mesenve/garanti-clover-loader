<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garanti Yonca Loader</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 64px;
            background: #f5f7f6;
            font-family: Arial, sans-serif;
            padding-top: 56px;
            box-sizing: border-box;
        }

        object {
            width: 100%;
            height: 100%;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 4px;
            border: 1px solid #d9e1dc;
            border-radius: 999px;
            background: #ffffff;
        }

        .tab {
            border: 0;
            border-radius: 999px;
            padding: 10px 18px;
            background: transparent;
            color: #30513c;
            cursor: pointer;
            font: inherit;
        }

        .tab[aria-selected="true"] {
            background: #0f5f2b;
            color: #ffffff;
        }

        .panel {
            display: none;
            place-items: center;
            min-height: 220px;
        }

        .panel.is-active {
            display: grid;
        }

        .loader {
            width: min(40vw, 160px);
            aspect-ratio: 39 / 59;
        }

        .scatter-loader {
            width: min(40vw, 160px);
            aspect-ratio: 39 / 59;
        }
    </style>
</head>
<body>
    <nav class="tabs" aria-label="Loading animasyonlari">
        <button class="tab" type="button" aria-selected="true" aria-controls="loading-1" data-tab="loading-1">Loading-1</button>
        <button class="tab" type="button" aria-selected="false" aria-controls="loading-2" data-tab="loading-2">Loading-2</button>
    </nav>
    <main>
        <section class="panel is-active" id="loading-1" aria-label="Loading 1">
            <div class="loader" aria-label="Garanti yonca loading animasyonu">
                <object type="image/svg+xml" data="./garanti-clover-loader.svg" aria-label="Loading"></object>
            </div>
        </section>
        <section class="panel" id="loading-2" aria-label="Loading 2">
            <div class="scatter-loader" aria-label="Garanti yonca scatter loading animasyonu">
                <object type="image/svg+xml" data="./loading-2-scatter.svg" aria-label="Loading"></object>
            </div>
        </section>
    </main>
    <script>
        const tabs = document.querySelectorAll(".tab");
        const panels = document.querySelectorAll(".panel");

        tabs.forEach((tab) => {
            tab.addEventListener("click", () => {
                const target = tab.dataset.tab;

                tabs.forEach((item) => {
                    item.setAttribute("aria-selected", String(item === tab));
                });

                panels.forEach((panel) => {
                    panel.classList.toggle("is-active", panel.id === target);
                });
            });
        });
    </script>
</body>
</html>
